name: Generar APK Android

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  construir-apk:
    name: Compilar SumaFacturas
    runs-on: ubuntu-latest

    steps:
      - name: Descargar proyecto
        uses: actions/checkout@v6

      - name: Configurar Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Configurar Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.7"

      - name: Dar permisos de ejecución
        run: |
          if [ -f "./gradlew" ]; then
            chmod +x ./gradlew
          fi

      - name: Compilar APK Debug
        run: |
          if [ -f "./gradlew" ]; then
            ./gradlew assembleDebug --no-daemon
          else
            gradle assembleDebug --no-daemon
          fi

      - name: Verificar APK
        run: |
          echo "Archivos APK encontrados:"
          find . -type f -name "*.apk" -print

      - name: Guardar APK
        uses: actions/upload-artifact@v4
        with:
          name: SumaFacturas-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 30
